name: sdkwork_music_flutter_mobile
description: SDKWork Music Flutter mobile application
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  go_router: ^14.2.0
  provider: ^6.1.1
  http: ^1.2.0
  json_annotation: ^4.8.1
  flutter_secure_storage: ^9.0.0
  sdkwork_music_app_sdk:
    path: ../../sdks/sdkwork-music-app-sdk/sdkwork-music-app-sdk-typescript/generated/server-openapi

dev_dependencies:
  flutter_test:
    sdk: flutter
